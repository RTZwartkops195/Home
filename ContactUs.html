<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="assets/js/theme-init.js"></script>
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="assets/css/style_staging.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon.ico">
    <title>Contact Zwartkops 195</title>
</head>

<body>

    <!-- Club logo -->
    <img src="assets/img/Logo.png" alt="Zwartkops 195 Logo" class="logo">
    
    <div class="content-section">
        <form
            id="contactForm"
            action="https://formspree.io/f/mqednlzl"
            method="POST"
            enctype="multipart/form-data"
            >
            <label>
                Email:
                <input type="email" name="email" placeholder="example@gmail.com">
            </label>
            <label>
                Phone number:
                <input type="tel" name="phone" placeholder="+27 123 4567">
            </label>
            <label>
                Your message:
                <textarea name="request" placeholder="Have anything you'd like to let us know or ask?"></textarea>
            </label>
            <button type="submit">Send</button>
        </form>
    </div>

    <!-- Thank You Popup Modal -->
    <div id="popupModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--on-primary); padding:30px 20px; border-radius:10px; max-width:90vw; width:350px; text-align:center; position:relative; box-shadow:var(--box-shadow);">
            
            <!-- Close Button for Popup -->
            <span style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:22px; color:var(--on-background);" onclick="closeThankYouPopup()">&times;</span>
            
            <h2 style="color:var(--on-background);">Thank You!</h2>
            <p style="color:var(--on-background);">Thank you for your submission. We'll get back to you shortly.</p>
        </div>
    </div>

    <div class="section-divider"></div>

    <div class="content-section">
        <!-- Recruitment link -->
        <a href="https://roundtable.co.za/about-round-table/" style="color:#000000;"
            class="recruit">Want to become a Tabler? Click here</a>
  
        <h2>Follow Our Socials</h2>

        <!-- Social media icons -->
        <div class="Social">
            <!-- Facebook -->
            <a href="https://www.facebook.com/rt195zwartkops/">
                <i class="fa fa-facebook fa-3x" style="color: #1877F2;"></i>
            </a>
            <!-- Instagram -->
            <a href="https://www.instagram.com/zwartkops195/">
                <i class="fa fa-instagram fa-3x" style="color: #E4405F;"></i>
            </a>
            <!-- WhatsApp -->
            <a href="https://chat.whatsapp.com/LOPv7E57Gkh2Cl9Z8ooIkr">
                <i class="fa fa-whatsapp fa-3x" style="color: #25D366;"></i>
            </a>
        </div>
    </div>

    <script src="assets/js/Script.js"></script>
    <script>
        function closeThankYouPopup() {
            document.getElementById('thankYouModal').style.display = 'none';
        }

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = this;
            const formData = new FormData(form);
            
            // Convert FormData to JSON object
            const data = Object.fromEntries(formData);
            
            // Submit form to formspree
            fetch(form.action, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                // Show thank you popup only after successful submission
                document.getElementById('thankYouModal').style.display = 'flex';
                // Clear form fields after submission
                form.reset();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('There was an error submitting the form. Please try again.');
            });
        });
    </script>
</body>

</html>
